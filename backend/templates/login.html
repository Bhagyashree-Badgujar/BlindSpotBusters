{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — CivicAlert</title>

  <!-- ✅ FIX CSS -->
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />
</head>

<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo">
      <div class="icon">🏛️</div>
      <div>
        <h2>CivicAlert</h2>
        <p>Sign in to your account</p>
      </div>
    </div>

    <div id="alert-box" class="alert alert-error">
      <span>⚠️</span><span id="alert-msg"></span>
    </div>

    <form id="login-form" novalidate>
      <div style="display:flex;flex-direction:column;gap:16px;">

        <div class="form-group">
          <label class="form-label" for="username">Username or Email</label>
          <input class="form-input" type="text" id="username" name="username"
                 placeholder="john_doe or you@example.com" autocomplete="username" />
          <span class="form-error" id="err-username"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password"
                 placeholder="Your password" autocomplete="current-password" />
          <span class="form-error" id="err-password"></span>
        </div>

        <div style="display:flex;align-items:center;justify-content:space-between;">
          <label style="display:flex;align-items:center;gap:8px;font-size:.88rem;cursor:pointer;">
            <input type="checkbox" id="remember-me" name="remember_me" />
            Remember me
          </label>
          <a href="#" style="font-size:.88rem;">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-full" id="submit-btn">
          Sign In
        </button>

      </div>
    </form>

    <div class="auth-divider">or</div>

    <!-- ✅ FIX LINKS -->
    <p style="text-align:center;font-size:.9rem;">
      New to CivicAlert? <a href="/register/">Create account →</a>
    </p>

    <p style="text-align:center;font-size:.82rem;margin-top:12px;">
      <a href="/admin-login/" style="color:var(--text-muted);">Admin login →</a>
    </p>
  </div>

  <!-- ❌ REMOVE duplicate {% load static %} from here -->

  <!-- ✅ JS (already correct) -->
  <script src="{% static 'js/utils.js' %}"></script>
  <script src="{% static 'js/login.js' %}"></script>

</body>
</html>
