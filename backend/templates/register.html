{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — CivicAlert</title>

  <!-- ✅ FIX CSS -->
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />
</head>

<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo">
      <div class="icon">🏛️</div>
      <div>
        <h2>CivicAlert</h2>
        <p>Create your account</p>
      </div>
    </div>

    <div id="alert-box" class="alert alert-error">
      <span>⚠️</span><span id="alert-msg"></span>
    </div>

    <form id="register-form" novalidate>
      <div style="display:flex;flex-direction:column;gap:16px;">

        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input class="form-input" type="text" id="username" name="username"
                 placeholder="e.g. john_doe" autocomplete="username" />
          <span class="form-error" id="err-username"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input class="form-input" type="email" id="email" name="email"
                 placeholder="you@example.com" autocomplete="email" />
          <span class="form-error" id="err-email"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password"
                 placeholder="Min. 8 characters" autocomplete="new-password" />
          <span class="form-error" id="err-password"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirm Password</label>
          <input class="form-input" type="password" id="confirm-password" name="confirm_password"
                 placeholder="Repeat password" autocomplete="new-password" />
          <span class="form-error" id="err-confirm-password"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-full" id="submit-btn">
          Create Account
        </button>

      </div>
    </form>

    <div class="auth-divider">or</div>

    <!-- ✅ FIX LINK -->
    <p style="text-align:center;font-size:.9rem;">
      Already have an account? <a href="/login/">Sign in →</a>
    </p>
  </div>

  <!-- ❌ REMOVE duplicate {% load static %} here -->

  <!-- ✅ JS -->
  <script src="{% static 'js/utils.js' %}"></script>
  <script src="{% static 'js/register.js' %}"></script>

</body>
</html>
