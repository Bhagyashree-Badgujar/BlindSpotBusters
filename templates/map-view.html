{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map View — CivicAlert</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <style>
    .map-toolbar {
      background: rgba(255,255,255,.95);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }
    .map-title { font-size: 1.15rem; font-weight: 800; font-family: var(--font-head); }
    .map-subtitle { font-size: .82rem; color: var(--text-muted); margin-top: 2px; }
    .legend-item {
      display: flex; align-items: center; gap: 6px;
      font-size: .8rem; font-weight: 600;
    }
    .map-filters {
      display: flex; gap: 8px; flex-wrap: wrap;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      align-items: center;
    }
    .filter-map-btn {
      transition: all .2s cubic-bezier(.34,1.4,.64,1) !important;
    }
    .filter-map-btn.active {
      background: var(--grad-primary) !important;
      color: #fff !important;
      border-color: transparent !important;
      box-shadow: 0 4px 12px rgba(59,91,219,.3) !important;
    }
    #map {
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
    }
    .map-stats {
      display: flex; gap: 10px; flex-wrap: wrap;
    }
    .map-stat-pill {
      padding: 5px 12px;
      border-radius: 99px;
      font-size: .78rem; font-weight: 700;
      display: flex; align-items: center; gap: 6px;
    }
  </style>
</head>
<body class="page-map-view">

<nav class="navbar">
  <div class="navbar-inner">
    <a href="{% url 'dashboard' %}" class="navbar-brand">
      <div class="brand-icon">🏛️</div>
      CivicAlert
    </a>
    <div class="navbar-nav">
      <a href="{% url 'dashboard' %}" class="nav-link">🏠 Home</a>
      <a href="{% url 'submit_issue' %}" class="nav-link">📋 Submit Issue</a>
      <a href="{% url 'my_reports' %}" class="nav-link">📂 My Reports</a>
    </div>
    <div class="navbar-right">
      <button class="btn btn-outline btn-sm" id="logout-btn">Logout</button>
    </div>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar">
    <a href="{% url 'dashboard' %}" class="nav-link"><span class="icon">🏠</span> Home</a>
    <a href="{% url 'submit_issue' %}" class="nav-link"><span class="icon">➕</span> Submit Issue</a>
    <a href="{% url 'my_reports' %}" class="nav-link"><span class="icon">📂</span> My Reports</a>
    <a href="{% url 'map_view' %}" class="nav-link active"><span class="icon">🗺️</span> Map View</a>
  </aside>

  <main class="main-content" style="padding:20px;">

    <!-- Toolbar -->
    <div class="map-toolbar">
      <div>
        <div class="map-title">🗺️ Issue Map</div>
        <div class="map-subtitle">All reported civic issues in your area</div>
      </div>
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
        <div class="legend-item"><span class="dot-red"></span> Pending</div>
        <div class="legend-item"><span class="dot-yellow"></span> In Progress</div>
        <div class="legend-item"><span class="dot-green"></span> Resolved</div>
      </div>
    </div>

    <!-- Filter buttons -->
    <div class="map-filters">
      <span style="font-size:.8rem;font-weight:700;color:var(--text-muted);">Filter:</span>
      <button class="btn btn-outline btn-sm filter-map-btn active" data-status="">All Issues</button>
      <button class="btn btn-outline btn-sm filter-map-btn" data-status="pending">🔴 Pending</button>
      <button class="btn btn-outline btn-sm filter-map-btn" data-status="in_progress">🟡 In Progress</button>
      <button class="btn btn-outline btn-sm filter-map-btn" data-status="resolved">🟢 Resolved</button>
    </div>

    <!-- Map Container -->
    <div id="map" style="height:calc(100vh - 260px);min-height:420px;"></div>
  </main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="{% static 'js/utils.js' %}"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    document.getElementById('logout-btn')?.addEventListener('click', async function () {
      try { await API.post('/api/logout/'); } catch (e) {}
      localStorage.removeItem('civic_user');
      window.location.href = '/login/';
    });
    if (typeof initMapViewPage === 'function') initMapViewPage();
  });
</script>
</body>
</html>
