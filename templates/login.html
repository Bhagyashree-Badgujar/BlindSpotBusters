{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  {% include 'partials/civic-head.html' %}
  <title>Login — CivicLens</title>
</head>

<body class="auth-page">

  <div class="auth-card tilt-hover">
    <div class="auth-logo">
      <div class="icon" aria-hidden="true">◈</div>
      <div>
        <h2 class="brand-text-gradient" style="font-size:1.35rem;">CivicLens</h2>
        <p>Sign in to your account</p>
      </div>
    </div>

    <div style="display:flex;justify-content:flex-end;margin-bottom:8px;">
      <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle theme"></button>
    </div>

    <div id="alert-box" class="alert alert-error">
      <span>⚠️</span><span id="alert-msg"></span>
    </div>

    <form id="login-form" novalidate>
      <div style="display:flex;flex-direction:column;gap:16px;">

        <div class="form-group">
          <label class="form-label" for="username">Username or Email</label>
          <input class="form-input" type="text" id="username" name="username"
                 placeholder="john_doe or you@example.com" autocomplete="username" />
          <span class="form-error" id="err-username"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password"
                 placeholder="Your password" autocomplete="current-password" />
          <span class="form-error" id="err-password"></span>
        </div>

        <div style="display:flex;align-items:center;justify-content:space-between;">
          <label style="display:flex;align-items:center;gap:8px;font-size:.88rem;cursor:pointer;color:var(--text-muted);">
            <input type="checkbox" id="remember-me" name="remember_me" />
            Remember me
          </label>
          <a href="#" style="font-size:.88rem;">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-full metallic-shine" id="submit-btn">
          Sign In
        </button>

      </div>
    </form>

    <div class="auth-divider">or</div>

    <p style="text-align:center;font-size:.9rem;">
      New to CivicLens? <a href="{% url 'register_page' %}">Create account →</a>
    </p>

    <p style="text-align:center;font-size:.82rem;margin-top:12px;">
      <a href="{% url 'home' %}" style="color:var(--text-muted);">← Back to home</a>
      ·
      <a href="{% url 'admin_login_page' %}" style="color:var(--text-muted);">Admin login →</a>
    </p>
  </div>

  <script src="{% static 'js/utils.js' %}"></script>
  <script src="{% static 'js/theme.js' %}"></script>
  <script src="{% static 'js/login.js' %}"></script>

</body>
</html>
