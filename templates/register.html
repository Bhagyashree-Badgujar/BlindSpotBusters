{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  {% include 'partials/civic-head.html' %}
  <title>Register — CivicLens</title>
</head>

<body class="auth-page">

  <div class="auth-card tilt-hover">
    <div class="auth-logo">
      <div class="icon" aria-hidden="true">◈</div>
      <div>
        <h2 class="brand-text-gradient" style="font-size:1.35rem;">CivicLens</h2>
        <p>Create your account</p>
      </div>
    </div>

    <div style="display:flex;justify-content:flex-end;margin-bottom:8px;">
      <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle theme"></button>
    </div>

    <div id="alert-box" class="alert alert-error">
      <span>⚠️</span><span id="alert-msg"></span>
    </div>

    <form id="register-form" novalidate>
      <div style="display:flex;flex-direction:column;gap:16px;">

        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input class="form-input" type="text" id="username" name="username"
                 placeholder="Krish Singh or krishsingh" autocomplete="username" />
          <span class="form-error" id="err-username"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input class="form-input" type="email" id="email" name="email"
                 placeholder="krishsingh@example.com" autocomplete="email" />
          <span class="form-error" id="err-email"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password"
                 placeholder="Min. 8 characters" autocomplete="new-password" />
          <span class="form-error" id="err-password"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirm Password</label>
          <input class="form-input" type="password" id="confirm-password" name="confirm_password"
                 placeholder="Repeat password" autocomplete="new-password" />
          <span class="form-error" id="err-confirm-password"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-full metallic-shine" id="submit-btn">
          Create Account
        </button>

      </div>
    </form>

    <div class="auth-divider">or</div>

    <p style="text-align:center;font-size:.9rem;">
      Already have an account? <a href="{% url 'login_page' %}">Sign in →</a>
    </p>
    <p style="text-align:center;font-size:.82rem;margin-top:12px;">
      <a href="{% url 'home' %}" style="color:var(--text-muted);">← Back to home</a>
    </p>
  </div>

  <script src="{% static 'js/utils.js' %}"></script>
  <script src="{% static 'js/theme.js' %}"></script>
  <script src="{% static 'js/register.js' %}"></script>

</body>
</html>
