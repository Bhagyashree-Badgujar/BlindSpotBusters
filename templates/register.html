{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — CivicAlert</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  <style>
    .auth-floating-shapes {
      position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0;
    }
    .shape {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,.04);
      animation: floatShape linear infinite;
    }
    .shape:nth-child(1) { width:300px;height:300px; top:-100px; right:-80px; animation-duration:18s; }
    .shape:nth-child(2) { width:220px;height:220px; bottom:5%; left:-60px; animation-duration:24s; animation-delay:-8s; }
    @keyframes floatShape {
      0%,100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-25px) rotate(180deg); }
    }
    .auth-card { position: relative; z-index: 1; max-width: 480px; }
    .form-input-wrap { position: relative; }
    .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 1rem; pointer-events: none; z-index: 1; }
    .form-input-wrap .form-input { padding-left: 42px; }
    .password-strength {
      height: 4px; border-radius: 99px;
      background: var(--border); margin-top: 6px;
      overflow: hidden;
    }
    .password-strength-bar {
      height: 100%; border-radius: 99px;
      transition: width .4s ease, background .3s ease;
      width: 0%;
    }
    .steps-indicator {
      display: flex; gap: 6px; margin-bottom: 28px; justify-content: center;
    }
    .step-dot {
      width: 8px; height: 8px; border-radius: 99px;
      background: rgba(59,91,219,.2); transition: all .3s;
    }
    .step-dot.active { background: var(--primary); width: 24px; }
  </style>
</head>
<body class="auth-page">
  <div class="auth-floating-shapes">
    <div class="shape"></div>
    <div class="shape"></div>
  </div>

  <div class="auth-card">
    <div class="auth-logo">
      <div class="icon">🏛️</div>
      <div>
        <h2>CivicAlert</h2>
        <p>Create your account</p>
      </div>
    </div>

    <div id="alert-box" class="alert alert-error">
      <span>⚠️</span><span id="alert-msg"></span>
    </div>

    <form id="register-form" novalidate>
      <div style="display:flex;flex-direction:column;gap:16px;">

        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <div class="form-input-wrap">
            <span class="input-icon">👤</span>
            <input class="form-input" type="text" id="username" name="username"
                   placeholder="e.g. john_doe" autocomplete="username" />
          </div>
          <span class="form-error" id="err-username"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <div class="form-input-wrap">
            <span class="input-icon">📧</span>
            <input class="form-input" type="email" id="email" name="email"
                   placeholder="you@example.com" autocomplete="email" />
          </div>
          <span class="form-error" id="err-email"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="form-input-wrap">
            <span class="input-icon">🔑</span>
            <input class="form-input" type="password" id="password" name="password"
                   placeholder="Min. 8 characters" autocomplete="new-password" />
          </div>
          <div class="password-strength"><div class="password-strength-bar" id="strength-bar"></div></div>
          <span class="form-error" id="err-password"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirm Password</label>
          <div class="form-input-wrap">
            <span class="input-icon">🔒</span>
            <input class="form-input" type="password" id="confirm-password" name="confirm_password"
                   placeholder="Repeat password" autocomplete="new-password" />
          </div>
          <span class="form-error" id="err-confirm-password"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-full" id="submit-btn">
          Create Account →
        </button>

      </div>
    </form>

    <div class="auth-divider">or</div>

    <p style="text-align:center;font-size:.9rem;">
      Already have an account? <a href="/login/" style="font-weight:700;">Sign in →</a>
    </p>
  </div>

  <script src="{% static 'js/utils.js' %}"></script>
  <script src="{% static 'js/register.js' %}"></script>
  <script>
    // Password strength indicator (purely cosmetic enhancement)
    const pwdInput = document.getElementById('password');
    const bar = document.getElementById('strength-bar');
    if (pwdInput && bar) {
      pwdInput.addEventListener('input', function() {
        const val = this.value;
        let score = 0;
        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        const colors = ['','#ef4444','#f59e0b','#3b5bdb','#10b981'];
        const widths = ['0%','25%','50%','75%','100%'];
        bar.style.width = widths[score];
        bar.style.background = colors[score] || 'transparent';
      });
    }
  </script>
</body>
</html>
