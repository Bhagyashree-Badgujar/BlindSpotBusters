{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  {% include 'partials/civic-head.html' %}
  <title>Admin Login — CivicLens</title>
</head>
<body class="auth-page">

  <div class="auth-card tilt-hover">
    <div class="auth-logo">
      <div class="icon" aria-hidden="true">⬡</div>
      <div>
        <h2 class="brand-text-gradient" style="font-size:1.25rem;">CivicLens</h2>
        <p>Staff console access</p>
      </div>
    </div>

    <div style="display:flex;justify-content:flex-end;margin-bottom:8px;">
      <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle theme"></button>
    </div>

    <div id="alert-box" class="alert alert-error">
      <span>⚠️</span><span id="alert-msg"></span>
    </div>

    <form id="admin-login-form" novalidate>
      <div style="display:flex;flex-direction:column;gap:16px;">

        <div class="form-group">
          <label class="form-label" for="admin-pass">Admin Password</label>
          <input class="form-input" type="password" id="admin-pass" name="password"
                 placeholder="Enter admin password" autocomplete="current-password" />
          <span class="form-error" id="err-pass"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-full metallic-shine" id="submit-btn">
          Access CivicLens Admin
        </button>

      </div>
    </form>

    <p style="text-align:center;font-size:.85rem;margin-top:16px;color:var(--text-muted);">
      Django admin: <a href="/admin/">/admin/</a> (staff credentials)
    </p>
    <p style="text-align:center;font-size:.85rem;margin-top:8px;">
      <a href="{% url 'login_page' %}" style="color:var(--text-muted);">← User login</a>
      ·
      <a href="{% url 'home' %}" style="color:var(--text-muted);">Home</a>
    </p>
  </div>

<script src="{% static 'js/utils.js' %}"></script>
<script src="{% static 'js/theme.js' %}"></script>
<script src="{% static 'js/admin-login.js' %}"></script>
</body>
</html>
